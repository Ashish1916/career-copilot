name: backend-ci

on:
  push:
    paths: ["backend/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/ci.yml"]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev,adapters]"  # adapters extra (boto3/google) — CI tests the adapter layer
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Types (mypy, strict)
        run: mypy src/copilot
      - name: Tests (pytest)
        run: pytest
